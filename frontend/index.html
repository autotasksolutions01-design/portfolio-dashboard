<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Dashboard — Login</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">&#9650;</span>
      <span class="logo-text">Portfolio Dashboard</span>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">Login</button>
      <button class="tab-btn" data-tab="register">Register</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form active">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" placeholder="your username" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      <div id="login-error" class="error-msg hidden"></div>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="auth-form">
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="choose a username" required />
      </div>
      <div class="form-group">
        <label for="reg-email">Email (optional)</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="min 6 characters" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      <div id="register-error" class="error-msg hidden"></div>
      <div id="register-success" class="success-msg hidden"></div>
    </form>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
